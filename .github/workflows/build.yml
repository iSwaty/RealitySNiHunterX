name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "RealitySNIHunter" main.py
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealitySNIHunter-Windows
          path: dist/RealitySNIHunter.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build macOS binary
        run: |
          pyinstaller --onefile --windowed --name "RealitySNIHunter" main.py
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealitySNIHunter-macOS
          path: dist/RealitySNIHunter

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Linux binary
        run: |
          pyinstaller --onefile --name "RealitySNIHunter" main.py
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealitySNIHunter-Linux
          path: dist/RealitySNIHunter

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/RealitySNIHunter-Windows/RealitySNIHunter.exe
            artifacts/RealitySNIHunter-macOS/RealitySNIHunter
            artifacts/RealitySNIHunter-Linux/RealitySNIHunter
          body: |
            ## 📦 Reality SNI Hunter - Кроссплатформенный релиз
            
            ### ✅ Что нового:
            - Расширенная фильтрация SNI (150+ известных доменов)
            - Поддержка Windows, macOS и Linux
            - Мультиязычный интерфейс (RU/EN/CN)
            
            ### 📥 Установка:
            1. Скачайте файл для вашей ОС
            2. Запустите исполняемый файл
            3. Для работы нужны базы GeoIP (Country.mmdb, ASN.mmdb)
            
            ### 🔧 Для macOS:
            Если ошибка Tkinter: `brew install python-tk@3.10`
            
            ### 📖 Полная документация:
            См. README.md в репозитории
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
